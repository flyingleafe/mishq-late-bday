services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sutta-mcp-server
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MCP_PATH: /mcp
      DATABASE_URL: postgresql://sutta:suttapass@pgvector:5432/suttas
    ports:
      - "3000:3000"
    depends_on:
      - pgvector
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: sutta-pgvector
    environment:
      POSTGRES_USER: sutta
      POSTGRES_PASSWORD: suttapass
      POSTGRES_DB: suttas
    ports:
      - "5433:5432"
    volumes:
      - sutta_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sutta_pgdata:
